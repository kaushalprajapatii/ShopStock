<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products – ShopStock</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>
  <div class="app-layout">
    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" id="hamburger">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Products</span>
      </div>
      <div class="page-body">

        <div class="page-toolbar">
          <div class="toolbar-left">
            <div class="search-input-wrap">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" class="form-control search-input" id="search-input" placeholder="Search by name or code…">
            </div>
          </div>
          <div class="toolbar-right">
            <button class="btn btn-primary" id="add-product-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Product
            </button>
          </div>
        </div>

        <div class="dept-tabs" id="dept-tabs">
          <button class="dept-tab active" data-dept="">All</button>
          <button class="dept-tab" data-dept="Stationery">Stationery</button>
          <button class="dept-tab" data-dept="Gifts">Gifts</button>
          <button class="dept-tab" data-dept="Furniture">Furniture</button>
          <button class="dept-tab" data-dept="Sports">Sports</button>
          <button class="dept-tab" data-dept="Daily Items">Daily Items</button>
        </div>

        <div id="products-container">
          <div class="loading"><div class="spinner"></div>Loading products…</div>
        </div>

      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Product</span>
        <button class="modal-close" onclick="closeModal('product-modal')">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="product-id">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Product Name *</label>
            <input type="text" class="form-control" id="p-name" placeholder="e.g. Blue Pen">
          </div>
          <div class="form-group">
            <label class="form-label">Product Code *</label>
            <input type="text" class="form-control" id="p-code" placeholder="e.g. PEN001">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Department *</label>
            <select class="form-control" id="p-dept">
              <option value="">Select…</option>
              <option>Stationery</option>
              <option>Gifts</option>
              <option>Furniture</option>
              <option>Sports</option>
              <option>Daily Items</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Price (₹) *</label>
            <input type="number" class="form-control" id="p-price" placeholder="0.00" min="0" step="0.01">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Initial Quantity</label>
            <input type="number" class="form-control" id="p-qty" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Low Stock Threshold</label>
            <input type="number" class="form-control" id="p-threshold" placeholder="10" min="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" class="form-control" id="p-desc" placeholder="Optional description">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('product-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-product-btn">Save Product</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Delete Product</span>
        <button class="modal-close" onclick="closeModal('delete-modal')">×</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text2);font-size:0.85rem">Are you sure you want to delete <strong id="delete-product-name"></strong>? This cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
        <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    Auth.requireAuth();

    let allProducts = [];
    let activeDept = '';
    let searchQuery = '';
    let deleteProductId = null;

    async function loadProducts() {
      try {
        const params = new URLSearchParams();
        if (activeDept) params.set('department', activeDept);
        if (searchQuery) params.set('search', searchQuery);
        const products = await Api.get(`/products/?${params}`);
        allProducts = products;
        renderProducts(products);
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    function renderProducts(products) {
      const container = document.getElementById('products-container');
      if (products.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <h3>No products found</h3>
          <p>Add your first product to get started.</p>
        </div>`;
        return;
      }

      container.innerHTML = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Product</th>
                <th>Department</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Value</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td><code style="color:var(--text3);font-size:0.72rem">${p.code}</code></td>
                  <td>
                    <div style="font-weight:700">${p.name}</div>
                    ${p.description ? `<div style="font-size:0.65rem;color:var(--text3)">${p.description}</div>` : ''}
                  </td>
                  <td>${deptBadge(p.department)}</td>
                  <td style="font-family:var(--font-head);font-weight:700;${p.is_low_stock ? 'color:var(--danger)' : ''}">${p.quantity}</td>
                  <td>${formatCurrency(p.price)}</td>
                  <td>${formatCurrency(p.price * p.quantity)}</td>
                  <td>${lowStockBadge(p.is_low_stock)}</td>
                  <td>
                    <div style="display:flex;gap:6px">
                      <button class="btn btn-ghost btn-sm btn-icon" onclick="editProduct(${p.id})" title="Edit">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button class="btn btn-ghost btn-sm btn-icon" onclick="confirmDelete(${p.id}, '${p.name.replace(/'/g,"\\'")}', event)" title="Delete" style="color:var(--danger)">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                      </button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <div style="padding:10px 14px;font-size:0.7rem;color:var(--text3);border-top:1px solid var(--border)">${products.length} product${products.length !== 1 ? 's' : ''}</div>
      `;
    }

    function editProduct(id) {
      const p = allProducts.find(x => x.id === id);
      if (!p) return;
      document.getElementById('modal-title').textContent = 'Edit Product';
      document.getElementById('product-id').value = p.id;
      document.getElementById('p-name').value = p.name;
      document.getElementById('p-code').value = p.code;
      document.getElementById('p-dept').value = p.department;
      document.getElementById('p-price').value = p.price;
      document.getElementById('p-qty').value = p.quantity;
      document.getElementById('p-threshold').value = p.low_stock_threshold;
      document.getElementById('p-desc').value = p.description || '';
      openModal('product-modal');
    }

    function confirmDelete(id, name, e) {
      e.stopPropagation();
      deleteProductId = id;
      document.getElementById('delete-product-name').textContent = name;
      openModal('delete-modal');
    }

    document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
      if (!deleteProductId) return;
      try {
        await Api.delete(`/products/${deleteProductId}`);
        closeModal('delete-modal');
        toast('Product deleted');
        loadProducts();
        updateLowStockBadge();
      } catch (e) {
        toast(e.message, 'error');
      }
    });

    document.getElementById('add-product-btn').addEventListener('click', () => {
      document.getElementById('modal-title').textContent = 'Add Product';
      document.getElementById('product-id').value = '';
      ['p-name','p-code','p-desc'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('p-dept').value = '';
      document.getElementById('p-price').value = '';
      document.getElementById('p-qty').value = '0';
      document.getElementById('p-threshold').value = '10';
      openModal('product-modal');
    });

    document.getElementById('save-product-btn').addEventListener('click', async () => {
      const id = document.getElementById('product-id').value;
      const body = {
        name: document.getElementById('p-name').value.trim(),
        code: document.getElementById('p-code').value.trim().toUpperCase(),
        department: document.getElementById('p-dept').value,
        price: parseFloat(document.getElementById('p-price').value),
        quantity: parseInt(document.getElementById('p-qty').value) || 0,
        low_stock_threshold: parseInt(document.getElementById('p-threshold').value) || 10,
        description: document.getElementById('p-desc').value.trim() || null
      };

      if (!body.name || !body.code || !body.department || isNaN(body.price)) {
        toast('Please fill all required fields', 'error'); return;
      }

      try {
        if (id) {
          await Api.put(`/products/${id}`, body);
          toast('Product updated');
        } else {
          await Api.post('/products/', body);
          toast('Product added');
        }
        closeModal('product-modal');
        loadProducts();
        updateLowStockBadge();
      } catch (e) {
        toast(e.message, 'error');
      }
    });

    // Dept filter tabs
    document.querySelectorAll('.dept-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.dept-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeDept = tab.dataset.dept;
        loadProducts();
      });
    });

    // Search
    let searchTimer;
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = e.target.value.trim();
        loadProducts();
      }, 300);
    });

    loadProducts();
  </script>
</body>
</html>
