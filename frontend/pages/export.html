<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export – ShopStock</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .export-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .export-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
    .export-card-title { font-family: var(--font-head); font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .export-card-desc { font-size: 0.75rem; color: var(--text3); margin-bottom: 18px; line-height: 1.5; }
    .export-btns { display: flex; gap: 8px; }
    .export-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .icon-green { background: rgba(76,175,125,0.15); color: var(--success); }
    .icon-blue { background: rgba(91,141,238,0.15); color: var(--info); }
  </style>
</head>
<body>
  <div id="sidebar-placeholder"></div>
  <div class="app-layout">
    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" id="hamburger">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Export Reports</span>
      </div>
      <div class="page-body">

        <p style="color:var(--text3);font-size:0.82rem;margin-bottom:24px">Download your inventory and transaction data as PDF or Excel files.</p>

        <div class="export-grid">

          <div class="export-card">
            <div class="export-icon icon-green">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <div class="export-card-title">Products Report</div>
            <div class="export-card-desc">Full product list with current stock levels, prices, total value, and low-stock status.</div>
            <div class="export-btns">
              <button class="btn btn-success btn-sm" onclick="download('/export/products/excel', 'products.xlsx')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
                Excel
              </button>
              <button class="btn btn-ghost btn-sm" onclick="download('/export/products/pdf', 'products.pdf')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
                PDF
              </button>
            </div>
          </div>

          <div class="export-card">
            <div class="export-icon icon-blue">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div class="export-card-title">Transactions Report</div>
            <div class="export-card-desc">Complete transaction history including sales and purchases with amounts, dates, and notes.</div>
            <div class="export-btns">
              <button class="btn btn-success btn-sm" onclick="download('/export/transactions/excel', 'transactions.xlsx')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
                Excel
              </button>
              <button class="btn btn-ghost btn-sm" onclick="download('/export/transactions/pdf', 'transactions.pdf')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
                PDF
              </button>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    Auth.requireAuth();

    async function download(path, filename) {
      try {
        toast('Preparing download…');
        await Api.download(path, filename);
        toast(`${filename} downloaded!`);
      } catch (e) {
        toast(e.message, 'error');
      }
    }
  </script>
</body>
</html>
