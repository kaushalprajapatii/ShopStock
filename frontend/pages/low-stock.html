<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Low Stock – ShopStock</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>
  <div class="app-layout">
    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" id="hamburger">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Low Stock Alerts</span>
      </div>
      <div class="page-body">

        <div id="low-stock-container">
          <div class="loading"><div class="spinner"></div>Checking stock levels…</div>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    Auth.requireAuth();

    async function loadLowStock() {
      try {
        const products = await Api.get('/products/low-stock');
        const container = document.getElementById('low-stock-container');

        if (products.length === 0) {
          container.innerHTML = `
            <div style="text-align:center;padding:64px 24px">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.5" style="margin-bottom:16px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              <h3 style="font-family:var(--font-head);color:var(--success);font-size:1.1rem;margin-bottom:8px">All Stock Levels OK!</h3>
              <p style="color:var(--text3);font-size:0.82rem">No products are below their threshold. You're well stocked.</p>
              <a href="/products.html" class="btn btn-ghost" style="margin-top:16px;display:inline-flex">View All Products</a>
            </div>`;
          return;
        }

        container.innerHTML = `
          <div class="alert-banner" style="margin-bottom:20px">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            ${products.length} product${products.length > 1 ? 's need' : ' needs'} restocking
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Code</th>
                  <th>Product</th>
                  <th>Department</th>
                  <th>Current Qty</th>
                  <th>Threshold</th>
                  <th>Shortage</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${products.map(p => `
                  <tr>
                    <td><code style="color:var(--text3);font-size:0.72rem">${p.code}</code></td>
                    <td style="font-weight:700">${p.name}</td>
                    <td>${deptBadge(p.department)}</td>
                    <td style="color:var(--danger);font-family:var(--font-head);font-weight:800;font-size:1rem">${p.quantity}</td>
                    <td style="color:var(--text3)">${p.low_stock_threshold}</td>
                    <td style="color:var(--danger);font-weight:700">-${p.low_stock_threshold - p.quantity}</td>
                    <td>
                      <a href="/transactions.html" class="btn btn-success btn-sm">
                        + Restock
                      </a>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          <div style="padding:10px 14px;font-size:0.7rem;color:var(--text3);border-top:1px solid var(--border)">
            ${products.length} item${products.length !== 1 ? 's' : ''} need restocking
          </div>`;
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    loadLowStock();
  </script>
</body>
</html>
