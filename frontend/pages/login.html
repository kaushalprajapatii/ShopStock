<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – ShopStock</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 100%; max-width: 360px; padding: 16px; }
    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-brand h1 { font-family: var(--font-head); font-size: 2rem; font-weight: 800; color: var(--accent); }
    .login-brand p { color: var(--text3); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; }
    .login-card h2 { font-family: var(--font-head); font-size: 1rem; margin-bottom: 20px; color: var(--text); }
    .login-error { background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.3); border-radius: var(--radius); padding: 8px 12px; color: var(--danger); font-size: 0.78rem; margin-bottom: 14px; display: none; }
    .btn-login { width: 100%; justify-content: center; padding: 11px; font-size: 0.85rem; margin-top: 4px; }
    .login-hint { text-align: center; margin-top: 16px; font-size: 0.7rem; color: var(--text3); }
    .login-hint code { background: var(--bg3); padding: 1px 6px; border-radius: 3px; color: var(--text2); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <h1>ShopStock</h1>
      <p>Inventory Management System</p>
    </div>
    <div class="login-card">
      <h2>Sign In</h2>
      <div class="login-error" id="login-error"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="admin@shop.com" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-login" id="login-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
    </div>
    <p class="login-hint">Default: <code>admin@shop.com</code> / <code>admin123</code></p>
  </div>
  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      if (!email || !password) {
        errEl.textContent = 'Please enter email and password.';
        errEl.style.display = 'block'; return;
      }

      btn.textContent = 'Signing in...';
      btn.disabled = true;
      errEl.style.display = 'none';

      try {
        const formData = new URLSearchParams();
        formData.append('username', email);
        formData.append('password', password);

        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Invalid credentials');
        }

        const data = await res.json();
        Auth.setToken(data.access_token, data.email);
        window.location.href = '/dashboard.html';
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
